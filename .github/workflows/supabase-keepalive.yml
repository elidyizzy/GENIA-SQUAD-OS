name: Supabase Keep-Alive (GEN.IA Brain)

on:
  schedule:
    # Roda a cada 5 dias às 08:00 UTC (evita pausa por inatividade do plano Free)
    - cron: '0 8 */5 * *'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Ping REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/tasks?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Supabase respondeu com status: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "✅ Projeto ativo."
          else
            echo "❌ Supabase retornou $STATUS — verificar se o projeto está pausado."
            exit 1
          fi
