<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-bg); padding: 24px 32px; font-family: var(--font-body); color: var(--color-fg); display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius-full); font-size: 12px; font-weight: 500; }
  .tag-green { background: var(--color-primary-100); color: var(--color-primary-800); }
  .tag-terra { background: var(--color-secondary-100); color: var(--color-secondary-800); }
  .tag-sand { background: var(--color-neutral-100); color: var(--color-neutral-700); }
  .tag-gold { background: var(--color-accent-100); color: #7A6420; }
  .tag-outline { background: transparent; border: 1px solid var(--color-border); color: var(--color-fg-muted); }
  .badge { display: inline-flex; align-items: center; justify-content: center; padding: 4px 10px; border-radius: var(--radius-full); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-new { background: var(--color-primary-700); color: white; }
  .badge-sale { background: var(--color-secondary-500); color: white; }
  .badge-limited { background: var(--color-accent-500); color: white; }
</style></head><body>
<span class="tag tag-green">Samambaia</span>
<span class="tag tag-green">Suculenta</span>
<span class="tag tag-terra">Meia-sombra</span>
<span class="tag tag-sand">Indoor</span>
<span class="tag tag-gold">Premium</span>
<span class="tag tag-outline">Mini</span>
<span class="tag tag-outline">Média</span>
<span class="badge badge-new">Novo</span>
<span class="badge badge-sale">-20%</span>
<span class="badge badge-limited">Limitado</span>
</body></html>
