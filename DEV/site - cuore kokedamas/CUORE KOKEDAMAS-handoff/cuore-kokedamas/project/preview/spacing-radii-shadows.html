<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-bg); padding: 24px 32px; font-family: var(--font-body); color: var(--color-fg); display: flex; gap: 24px; flex-wrap: wrap; }
  .group { display: flex; flex-direction: column; gap: 8px; }
  .group-title { font-size: 10px; color: var(--color-fg-subtle); text-transform: uppercase; letter-spacing: 0.1em; }
  .boxes { display: flex; gap: 6px; align-items: flex-end; }
  .box { background: var(--color-primary-200); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--color-primary-800); font-family: monospace; }
  .radii-row { display: flex; gap: 10px; align-items: center; }
  .radius-box { width: 48px; height: 48px; background: var(--color-primary-100); border: 2px solid var(--color-primary-400); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--color-primary-700); font-family: monospace; }
  .shadow-row { display: flex; gap: 12px; align-items: center; }
  .shadow-box { width: 64px; height: 44px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--color-fg-muted); font-family: monospace; }
</style></head><body>
<div class="group">
  <div class="group-title">Spacing</div>
  <div class="boxes">
    <div class="box" style="width:16px;height:16px">4</div>
    <div class="box" style="width:24px;height:24px">8</div>
    <div class="box" style="width:28px;height:28px">12</div>
    <div class="box" style="width:32px;height:32px">16</div>
    <div class="box" style="width:40px;height:40px">24</div>
    <div class="box" style="width:48px;height:48px">32</div>
    <div class="box" style="width:60px;height:60px">48</div>
  </div>
</div>
<div class="group">
  <div class="group-title">Radii</div>
  <div class="radii-row">
    <div class="radius-box" style="border-radius:4px">4</div>
    <div class="radius-box" style="border-radius:8px">8</div>
    <div class="radius-box" style="border-radius:12px">12</div>
    <div class="radius-box" style="border-radius:16px">16</div>
    <div class="radius-box" style="border-radius:9999px">full</div>
  </div>
</div>
<div class="group">
  <div class="group-title">Shadows</div>
  <div class="shadow-row">
    <div class="shadow-box" style="box-shadow:0 1px 3px rgba(44,37,32,0.06)">sm</div>
    <div class="shadow-box" style="box-shadow:0 4px 12px rgba(44,37,32,0.08)">md</div>
    <div class="shadow-box" style="box-shadow:0 8px 24px rgba(44,37,32,0.10)">lg</div>
    <div class="shadow-box" style="box-shadow:0 16px 48px rgba(44,37,32,0.12)">xl</div>
  </div>
</div>
</body></html>
