<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-bg); padding: 24px; font-family: var(--font-body); display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
  .group { display: flex; flex-direction: column; gap: 4px; }
  .group-label { font-size: 10px; color: var(--color-fg-subtle); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .row { display: flex; gap: 8px; }
  .swatch { width: 56px; text-align: center; }
  .swatch-color { width: 56px; height: 40px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); }
  .swatch-hex { font-size: 9px; color: var(--color-fg-subtle); font-family: monospace; margin-top: 3px; }
</style></head><body>
<div class="group">
  <div class="group-label">Accent / Dourado</div>
  <div class="row">
    <div class="swatch"><div class="swatch-color" style="background:#B8963E"></div><div class="swatch-hex">#B8963E</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#CBAB5A"></div><div class="swatch-hex">#CBAB5A</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#DCC47E"></div><div class="swatch-hex">#DCC47E</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#EDDCAA"></div><div class="swatch-hex">#EDDCAA</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#F6EED4"></div><div class="swatch-hex">#F6EED4</div></div>
  </div>
</div>
<div class="group">
  <div class="group-label">Semantic</div>
  <div class="row">
    <div class="swatch"><div class="swatch-color" style="background:#FDFBF8"></div><div class="swatch-hex">bg</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#F7F5F2"></div><div class="swatch-hex">bg-warm</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#2C2520"></div><div class="swatch-hex">fg</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#756556"></div><div class="swatch-hex">muted</div></div>
    <div class="swatch"><div class="swatch-color" style="background:#D9D0C5"></div><div class="swatch-hex">border</div></div>
  </div>
</div>
</body></html>
