<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-bg); padding: 24px 32px; font-family: var(--font-body); color: var(--color-fg); display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  button { font-family: var(--font-body); cursor: pointer; border: none; font-size: 14px; font-weight: 600; border-radius: var(--radius-md); transition: all var(--duration-normal) var(--ease-out); letter-spacing: 0.02em; }
  .btn-primary { background: var(--color-primary-700); color: white; padding: 12px 28px; }
  .btn-primary:hover { background: var(--color-primary-600); box-shadow: var(--shadow-md); }
  .btn-secondary { background: transparent; color: var(--color-primary-700); padding: 11px 27px; border: 1.5px solid var(--color-primary-700); }
  .btn-secondary:hover { background: var(--color-primary-50); }
  .btn-terracota { background: var(--color-secondary-500); color: white; padding: 12px 28px; }
  .btn-terracota:hover { background: var(--color-secondary-400); }
  .btn-ghost { background: transparent; color: var(--color-fg-muted); padding: 12px 28px; }
  .btn-ghost:hover { background: var(--color-neutral-100); }
  .btn-sm { padding: 8px 18px; font-size: 12px; border-radius: 6px; }
  .btn-pill { border-radius: var(--radius-full); }
</style></head><body>
<button class="btn-primary">Comprar agora</button>
<button class="btn-secondary">Saiba mais</button>
<button class="btn-terracota">Encomende</button>
<button class="btn-ghost">Cancelar</button>
<button class="btn-primary btn-pill">WhatsApp</button>
<button class="btn-primary btn-sm">Adicionar</button>
<button class="btn-secondary btn-sm">Detalhes</button>
</body></html>
