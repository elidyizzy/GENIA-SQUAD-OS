<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-bg); padding: 24px 32px; font-family: var(--font-body); color: var(--color-fg); }
  .specimen { margin-bottom: 16px; display: flex; align-items: baseline; gap: 16px; }
  .specimen:last-child { margin-bottom: 0; }
  .label { font-size: 10px; color: var(--color-fg-subtle); text-transform: uppercase; letter-spacing: 0.1em; width: 48px; flex-shrink: 0; padding-top: 4px; font-family: var(--font-body); }
  .display { font-family: var(--font-display); }
</style></head><body>
<div class="specimen"><span class="label">6xl</span><span class="display" style="font-size:3.75rem;line-height:1.1;font-weight:400">Cuore</span></div>
<div class="specimen"><span class="label">5xl</span><span class="display" style="font-size:3rem;line-height:1.15;font-weight:500">Kokedamas</span></div>
<div class="specimen"><span class="label">4xl</span><span class="display" style="font-size:2.25rem;line-height:1.2;font-weight:600">Jardim Suspenso</span></div>
<div class="specimen"><span class="label">3xl</span><span class="display" style="font-size:1.875rem;line-height:1.25;font-weight:400;font-style:italic">natureza que cabe na palma da mão</span></div>
<div class="specimen"><span class="label">2xl</span><span class="display" style="font-size:1.5rem;line-height:1.3;font-weight:600">Feito à mão, com amor e musgo</span></div>
</body></html>
