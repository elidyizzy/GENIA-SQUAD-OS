<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-bg); padding: 24px; font-family: var(--font-body); display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { width: 80px; text-align: center; }
  .swatch-color { width: 80px; height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); }
  .swatch-label { font-size: 11px; color: var(--color-fg-muted); margin-top: 6px; }
  .swatch-hex { font-size: 10px; color: var(--color-fg-subtle); font-family: monospace; }
</style></head><body>
<div class="swatch"><div class="swatch-color" style="background:#2C2520"></div><div class="swatch-label">900</div><div class="swatch-hex">#2C2520</div></div>
<div class="swatch"><div class="swatch-color" style="background:#44392F"></div><div class="swatch-label">800</div><div class="swatch-hex">#44392F</div></div>
<div class="swatch"><div class="swatch-color" style="background:#5C4E41"></div><div class="swatch-label">700</div><div class="swatch-hex">#5C4E41</div></div>
<div class="swatch"><div class="swatch-color" style="background:#756556"></div><div class="swatch-label">600</div><div class="swatch-hex">#756556</div></div>
<div class="swatch"><div class="swatch-color" style="background:#8E7D6C"></div><div class="swatch-label">500</div><div class="swatch-hex">#8E7D6C</div></div>
<div class="swatch"><div class="swatch-color" style="background:#A89888"></div><div class="swatch-label">400</div><div class="swatch-hex">#A89888</div></div>
<div class="swatch"><div class="swatch-color" style="background:#C2B5A6"></div><div class="swatch-label">300</div><div class="swatch-hex">#C2B5A6</div></div>
<div class="swatch"><div class="swatch-color" style="background:#D9D0C5"></div><div class="swatch-label">200</div><div class="swatch-hex">#D9D0C5</div></div>
<div class="swatch"><div class="swatch-color" style="background:#EDE8E2"></div><div class="swatch-label">100</div><div class="swatch-hex">#EDE8E2</div></div>
<div class="swatch"><div class="swatch-color" style="background:#F7F5F2"></div><div class="swatch-label">50</div><div class="swatch-hex">#F7F5F2</div></div>
</body></html>
