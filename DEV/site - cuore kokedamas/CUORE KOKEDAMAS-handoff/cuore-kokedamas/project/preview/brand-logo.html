<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-bg); padding: 20px 24px; font-family: var(--font-body); display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
  .variant { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .logo-box { width: 92px; height: 92px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; background: repeating-conic-gradient(#e8e8e8 0% 25%, #fff 0% 50%) 0 0 / 12px 12px; }
  .logo-box img { width: 80px; height: 80px; object-fit: contain; }
  .variant-label { font-size: 9px; color: var(--color-fg-subtle); text-transform: uppercase; letter-spacing: 0.08em; text-align: center; font-weight: 500; }
  .variant-hex { font-size: 8px; color: var(--color-fg-subtle); font-family: monospace; }
</style></head><body>

<div class="variant">
  <div class="logo-box"><img src="../assets/logo-branco.png" alt="Branco"></div>
  <div class="variant-label">Branco</div>
  <div class="variant-hex">#FFFFFF</div>
</div>

<div class="variant">
  <div class="logo-box"><img src="../assets/logo-verde-musgo.png" alt="Verde musgo"></div>
  <div class="variant-label">Verde musgo</div>
  <div class="variant-hex">#3B5A2B</div>
</div>

<div class="variant">
  <div class="logo-box"><img src="../assets/logo-terracota.png" alt="Terracota"></div>
  <div class="variant-label">Terracota</div>
  <div class="variant-hex">#A84B26</div>
</div>

<div class="variant">
  <div class="logo-box"><img src="../assets/logo-neutro-escuro.png" alt="Neutro escuro"></div>
  <div class="variant-label">Neutro escuro</div>
  <div class="variant-hex">#44392F</div>
</div>

<div class="variant">
  <div class="logo-box"><img src="../assets/logo-preto.png" alt="Preto"></div>
  <div class="variant-label">Preto</div>
  <div class="variant-hex">#111111</div>
</div>

<div class="variant">
  <div class="logo-box"><img src="../assets/logo-dourado.png" alt="Dourado"></div>
  <div class="variant-label">Dourado</div>
  <div class="variant-hex">#B8963E</div>
</div>

</body></html>
