<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-bg); padding: 24px; font-family: var(--font-body); display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { width: 80px; text-align: center; }
  .swatch-color { width: 80px; height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); }
  .swatch-label { font-size: 11px; color: var(--color-fg-muted); margin-top: 6px; }
  .swatch-hex { font-size: 10px; color: var(--color-fg-subtle); font-family: monospace; }
</style></head><body>
<div class="swatch"><div class="swatch-color" style="background:#4A1E0E"></div><div class="swatch-label">900</div><div class="swatch-hex">#4A1E0E</div></div>
<div class="swatch"><div class="swatch-color" style="background:#6B2C15"></div><div class="swatch-label">800</div><div class="swatch-hex">#6B2C15</div></div>
<div class="swatch"><div class="swatch-color" style="background:#8C3A1C"></div><div class="swatch-label">700</div><div class="swatch-hex">#8C3A1C</div></div>
<div class="swatch"><div class="swatch-color" style="background:#A84B26"></div><div class="swatch-label">600</div><div class="swatch-hex">#A84B26</div></div>
<div class="swatch"><div class="swatch-color" style="background:#C45D33"></div><div class="swatch-label">500</div><div class="swatch-hex">#C45D33</div></div>
<div class="swatch"><div class="swatch-color" style="background:#D4805B"></div><div class="swatch-label">400</div><div class="swatch-hex">#D4805B</div></div>
<div class="swatch"><div class="swatch-color" style="background:#E0A088"></div><div class="swatch-label">300</div><div class="swatch-hex">#E0A088</div></div>
<div class="swatch"><div class="swatch-color" style="background:#EDCAB9"></div><div class="swatch-label">200</div><div class="swatch-hex">#EDCAB9</div></div>
<div class="swatch"><div class="swatch-color" style="background:#F6E4DB"></div><div class="swatch-label">100</div><div class="swatch-hex">#F6E4DB</div></div>
<div class="swatch"><div class="swatch-color" style="background:#FBF2ED"></div><div class="swatch-label">50</div><div class="swatch-hex">#FBF2ED</div></div>
</body></html>
