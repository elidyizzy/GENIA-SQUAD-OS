<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-bg); padding: 24px; font-family: var(--font-body); display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { width: 80px; text-align: center; }
  .swatch-color { width: 80px; height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); }
  .swatch-label { font-size: 11px; color: var(--color-fg-muted); margin-top: 6px; }
  .swatch-hex { font-size: 10px; color: var(--color-fg-subtle); font-family: monospace; }
</style></head><body>
<div class="swatch"><div class="swatch-color" style="background:#1E3317"></div><div class="swatch-label">900</div><div class="swatch-hex">#1E3317</div></div>
<div class="swatch"><div class="swatch-color" style="background:#2B4A22"></div><div class="swatch-label">800</div><div class="swatch-hex">#2B4A22</div></div>
<div class="swatch"><div class="swatch-color" style="background:#3B5A2B"></div><div class="swatch-label">700</div><div class="swatch-hex">#3B5A2B</div></div>
<div class="swatch"><div class="swatch-color" style="background:#4A6F36"></div><div class="swatch-label">600</div><div class="swatch-hex">#4A6F36</div></div>
<div class="swatch"><div class="swatch-color" style="background:#5A8544"></div><div class="swatch-label">500</div><div class="swatch-hex">#5A8544</div></div>
<div class="swatch"><div class="swatch-color" style="background:#7BA362"></div><div class="swatch-label">400</div><div class="swatch-hex">#7BA362</div></div>
<div class="swatch"><div class="swatch-color" style="background:#9DBE87"></div><div class="swatch-label">300</div><div class="swatch-hex">#9DBE87</div></div>
<div class="swatch"><div class="swatch-color" style="background:#C2D8B5"></div><div class="swatch-label">200</div><div class="swatch-hex">#C2D8B5</div></div>
<div class="swatch"><div class="swatch-color" style="background:#E2EDDB"></div><div class="swatch-label">100</div><div class="swatch-hex">#E2EDDB</div></div>
<div class="swatch"><div class="swatch-color" style="background:#F2F7EF"></div><div class="swatch-label">50</div><div class="swatch-hex">#F2F7EF</div></div>
</body></html>
