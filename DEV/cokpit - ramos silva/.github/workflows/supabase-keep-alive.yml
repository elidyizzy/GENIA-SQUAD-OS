name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 */3 * *'   # a cada 3 dias às 08h UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/leads?select=count&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "Supabase ativo ✓" || exit 1
