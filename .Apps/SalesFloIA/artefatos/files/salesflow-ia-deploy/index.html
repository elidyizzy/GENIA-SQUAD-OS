  };

      }}
    >
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
      
      {/* Header */}
      <div
        style={{
          padding: "16px 28px",
          borderBottom: "1px solid #222",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          background: "linear-gradient(180deg, #141414 0%, #0D0D0D 100%)",
        }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div
              style={{
                width: 36,
                height: 36,
                borderRadius: 8,
                background: "linear-gradient(135deg, #F5A623, #E8B100)",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                fontSize: 18,
                fontWeight: 800,
                color: "#0D0D0D",
              }}
            >
              S
            </div>
            <div>
              <div style={{ fontSize: 16, fontWeight: 800, letterSpacing: -0.5 }}>
                <span style={{ color: "#F5A623" }}>SalesFlow</span>
                <span style={{ color: "#F0E6D3" }}>.IA</span>
                <span style={{ color: "#555", fontWeight: 400, fontSize: 11, marginLeft: 8 }}>By GEN.IA SQUAD</span>
              </div>
              <div style={{ fontSize: 10, color: "#555", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.5 }}>
                SPIN SELLING · AGENTES ORQUESTRADOS
              </div>
            </div>
          </div>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: 1, fontFamily: "'JetBrains Mono', monospace" }}>Pipeline</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#F5A623", fontFamily: "'JetBrains Mono', monospace" }}>
              R$ {(totalValue).toLocaleString("pt-BR")}
            </div>
          </div>
          <div style={{ width: 1, height: 30, background: "#333" }} />
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: 1, fontFamily: "'JetBrains Mono', monospace" }}>Leads</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#F0E6D3", fontFamily: "'JetBrains Mono', monospace" }}>{totalLeads}</div>
          </div>
          <button
            onClick={() => setShowNewLead(!showNewLead)}
            style={{
              background: "linear-gradient(135deg, #F5A623, #D4940A)",
              border: "none",
              borderRadius: 8,
              padding: "10px 18px",
              color: "#0D0D0D",
              fontWeight: 700,
              fontSize: 13,
              cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif",
              display: "flex",
              alignItems: "center",
              gap: 6,
            }}
            onMouseEnter={(e) => (e.currentTarget.style.opacity = "0.9")}
            onMouseLeave={(e) => (e.currentTarget.style.opacity = "1")}
          >
            + Novo Lead
          </button>
        </div>
      </div>

      {/* New Lead Form */}
      {showNewLead && (
        <div style={{ padding: "16px 28px", borderBottom: "1px solid #222", background: "#141414", display: "flex", gap: 12, alignItems: "flex-end" }}>
          <div style={{ flex: 1 }}>
            <label style={{ fontSize: 10, color: "#777", textTransform: "uppercase", letterSpacing: 1, fontFamily: "'JetBrains Mono', monospace", display: "block", marginBottom: 4 }}>Empresa</label>
            <input
              value={newLead.name}
              onChange={(e) => setNewLead({ ...newLead, name: e.target.value })}
              placeholder="Nome da empresa"
              style={{
                width: "100%",
                padding: "8px 12px",
                background: "#1E1E1E",
                border: "1px solid #333",
                borderRadius: 6,
                color: "#F0E6D3",
                fontSize: 13,
                fontFamily: "'DM Sans', sans-serif",
                outline: "none",
                boxSizing: "border-box",
              }}
              onFocus={(e) => (e.target.style.borderColor = "#F5A623")}
              onBlur={(e) => (e.target.style.borderColor = "#333")}
            />
          </div>
          <div style={{ flex: 1 }}>
            <label style={{ fontSize: 10, color: "#777", textTransform: "uppercase", letterSpacing: 1, fontFamily: "'JetBrains Mono', monospace", display: "block", marginBottom: 4 }}>Contato</label>
            <input
              value={newLead.contact}
              onChange={(e) => setNewLead({ ...newLead, contact: e.target.value })}
              placeholder="Nome do contato"
              style={{
                width: "100%",
                padding: "8px 12px",
                background: "#1E1E1E",
                border: "1px solid #333",
                borderRadius: 6,
                color: "#F0E6D3",
                fontSize: 13,
                fontFamily: "'DM Sans', sans-serif",
                outline: "none",
                boxSizing: "border-box",
              }}
              onFocus={(e) => (e.target.style.borderColor = "#F5A623")}
              onBlur={(e) => (e.target.style.borderColor = "#333")}
            />
          </div>
          <div>
            <label style={{ fontSize: 10, color: "#777", textTransform: "uppercase", letterSpacing: 1, fontFamily: "'JetBrains Mono', monospace", display: "block", marginBottom: 4 }}>Canal</label>
            <select
              value={newLead.channel}
              onChange={(e) => setNewLead({ ...newLead, channel: e.target.value })}
              style={{
                padding: "8px 12px",
                background: "#1E1E1E",
                border: "1px solid #333",
                borderRadius: 6,
                color: "#F0E6D3",
                fontSize: 13,
                fontFamily: "'DM Sans', sans-serif",
                outline: "none",
              }}
            >
              <option value="WhatsApp">💬 WhatsApp</option>
              <option value="Landing Page">🌐 Landing Page</option>
              <option value="Formulário">📋 Formulário</option>
              <option value="Agente SDR">🤖 Agente SDR</option>
            </select>
          </div>
          <button
            onClick={addLead}
            style={{
              padding: "9px 20px",
              background: "#F5A623",
              border: "none",
              borderRadius: 6,
              color: "#0D0D0D",
              fontWeight: 700,
              fontSize: 13,
              cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif",
              whiteSpace: "nowrap",
            }}
          >
            Adicionar
          </button>
          <button
            onClick={() => setShowNewLead(false)}
            style={{
              padding: "9px 14px",
              background: "none",
              border: "1px solid #333",
              borderRadius: 6,
              color: "#777",
              fontSize: 13,
              cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif",
            }}
          >
            ✕
          </button>
        </div>
      )}

      {/* SPIN Progress Bar */}
      <div style={{ padding: "12px 28px", borderBottom: "1px solid #1A1A1A", display: "flex", gap: 3 }}>
        {SPIN_STAGES.map((stage) => {
          const count = leads.filter((l) => l.stage === stage.id).length;
          const pct = totalLeads > 0 ? (count / totalLeads) * 100 : 0;
          return (
            <div
              key={stage.id}
              style={{
                flex: Math.max(pct, 5),
                height: 4,
                background: count > 0 ? stage.color : "#1E1E1E",
                borderRadius: 2,
                transition: "flex 0.4s ease",
                opacity: count > 0 ? 1 : 0.3,
              }}
              title={`${stage.label}: ${count} leads`}
            />
          );
        })}
      </div>

      {/* Kanban Board */}
      <div
        style={{
          display: "flex",
          gap: 1,
          padding: "0",
          overflowX: "auto",
          height: "calc(100vh - 130px)",
        }}
      >
        {SPIN_STAGES.map((stage) => {
          const stageLeads = leads.filter((l) => l.stage === stage.id);
          const stageValue = stageLeads
            .filter((l) => l.value !== "—")
            .reduce((s, l) => s + (parseInt(l.value.replace(/\D/g, "")) || 0), 0);

          return (
            <div
              key={stage.id}
              onDragOver={handleDragOver}
              onDrop={(e) => handleDrop(e, stage.id)}
              style={{
                flex: 1,
                minWidth: 260,
                background: "#111",
                display: "flex",
                flexDirection: "column",
                borderRight: "1px solid #1A1A1A",
              }}
            >
              {/* Column Header */}
              <div style={{ padding: "16px 16px 12px", borderBottom: "1px solid #1A1A1A" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 16 }}>{stage.icon}</span>
                    <span style={{ fontSize: 13, fontWeight: 700, color: stage.color, letterSpacing: -0.3 }}>{stage.label}</span>
                  </div>
                  <span
                    style={{
                      fontSize: 11,
                      fontWeight: 700,
                      color: "#555",
                      background: "#1A1A1A",
                      borderRadius: 10,
                      padding: "2px 8px",
                      fontFamily: "'JetBrains Mono', monospace",
                    }}
                  >
                    {stageLeads.length}
                  </span>
                </div>
                <div style={{ fontSize: 10, color: "#555", fontFamily: "'JetBrains Mono', monospace", marginBottom: 4 }}>
                  🤖 {stage.agent}
                  {stageValue > 0 && (
                    <span style={{ float: "right", color: "#444" }}>R$ {stageValue.toLocaleString("pt-BR")}</span>
                  )}
                </div>
                <div style={{ fontSize: 10, color: "#3A3A3A", fontFamily: "'DM Sans', sans-serif" }}>{stage.description}</div>
              </div>

              {/* Cards */}
              <div style={{ flex: 1, overflowY: "auto", padding: "8px 10px" }}>
                {stageLeads.map((lead) => (
                  <LeadCard
                    key={lead.id}
                    lead={lead}
                    onDragStart={handleDragStart}
                    onClick={setSelectedLead}
                    isSelected={selectedLead?.id === lead.id}
                  />
                ))}
                {stageLeads.length === 0 && (
                  <div
                    style={{
                      textAlign: "center",
                      padding: "30px 16px",
                      color: "#2A2A2A",
                      fontSize: 12,
                      fontFamily: "'DM Sans', sans-serif",
                    }}
                  >
                    Arraste leads aqui
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Lead Detail Slide-Over */}
      {selectedLead && (
        <>
          <div
            style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 998 }}
            onClick={() => setSelectedLead(null)}
          />
          <LeadDetail
            lead={selectedLead}
            stages={SPIN_STAGES}
            onClose={() => setSelectedLead(null)}
            onMove={(id, newStage) => {
              moveCard(id, newStage);
              setSelectedLead((prev) => ({ ...prev, stage: newStage }));
            }}
          />
        </>
      )}
    </div>
  );
}

    function App() {
      const [view, setView] = useState("arch");
      
      return (
        <div>
          <div className="sf-main-nav">
            <div className="sf-logo">
              <div className="sf-logo-icon">S</div>
              <div>
                <div className="sf-logo-text">
                  <span className="gold">SalesFlow</span>
                  <span className="cream">.IA</span>
                </div>
                <div className="sf-logo-sub">BY GEN.IA SQUAD</div>
              </div>
            </div>
            <div className="sf-tabs">
              <button 
                className={`sf-tab ${view === 'arch' ? 'active' : ''}`}
                onClick={() => setView('arch')}
              >
                ◈ Arquitetura Técnica
              </button>
              <button 
                className={`sf-tab ${view === 'crm' ? 'active' : ''}`}
                onClick={() => setView('crm')}
              >
                ◫ CRM Pipeline
              </button>
            </div>
            <div className="sf-badge">
              APRESENTAÇÃO FOUNDERS · v1.0
            </div>
          </div>
          <div className="sf-content">
            {view === 'arch' ? <SalesFlowArchitecture /> : <CRMKanban />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
